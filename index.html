<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamSMP – Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container für Taskbar -->
    <div id="taskbar"></div>

    <!-- Container für die Page -->
    <div id="page"></div>

    <script>
        // Lädt eine HTML-Datei in ein Ziel-Element
        async function loadInto(targetId, file) {
            try {
                const res = await fetch(file);
                const html = await res.text();
                document.getElementById(targetId).innerHTML = html;
            } catch (err) {
                document.getElementById(targetId).innerHTML =
                    "<p style='color:red;text-align:center;'>Fehler beim Laden: " + file + "</p>";
            }
        }

        // Taskbar laden
        loadInto("taskbar", "assets/taskbar.html");

        // Standard-Page laden (Home)
        loadInto("page", "pages/home.html");

        // Packed wird nicht direkt geladen,
        // aber steht für Seiten zur Verfügung (z.B. rules.html lädt regeln.txt)
    </script>

</body>
</html>
