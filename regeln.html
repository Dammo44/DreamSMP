<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamSMP – Regeln</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">DreamSMP</div>
        <ul class="nav-links">
            <li><a href="index.html">Portal</a></li>
            <li><a href="#">Welt</a></li>
            <li><a href="#">Gilde</a></li>
            <li><a href="regeln.html">Regeln</a></li>
        </ul>
    </nav>

    <!-- Hero -->
    <header class="hero">
        <h1>📜 Regelwerk</h1>
        <p>Dies sind unsere Regeln.</p>
    </header>

    <!-- Regeln -->
    <section class="section" id="regelnContainer" style="text-align:center;">
        <!-- JS fügt hier automatisch Cards ein -->
    </section>

    <footer class="footer">
        © 2026 DreamSMP – Regelwerk
    </footer>

    <script>
        fetch('info/regeln.txt')
            .then(response => response.text())
            .then(text => {
                const container = document.getElementById('regelnContainer');

                // Text in Abschnitte teilen (Leerzeile = neuer Abschnitt)
                const sections = text.split(/\n\s*\n/);

                sections.forEach(section => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    // Abstand zwischen den Cards
                    card.style.marginBottom = "25px";

                    // Text zentrieren
                    card.style.textAlign = "center";

                    // Zeilenumbrüche erhalten
                    card.innerHTML = section.replace(/\n/g, "<br>");

                    container.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('regelnContainer').innerHTML =
                    "<div class='card'>Fehler: Regeln konnten nicht geladen werden.</div>";
            });
    </script>

</body>
</html>
